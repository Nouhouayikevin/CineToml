# ================================
# CineToml v1.0 — Exemple complet
# "J'ai commandé 500 pizzas au boulot"
# ================================

[meta]
title      = "J'ai commandé 500 pizzas au boulot"
langue     = "fr"
resolution = "9x16"
fps        = 30
watermark  = "@moncompte"
hook       = "J'ai fait une erreur catastrophique au boulot"
cta        = "Suivez pour plus 😂"

[interface]
style    = "imessage"
heure    = "14:32"
batterie = 87
theme    = "sombre"

[audio]
musique  = "./assets/sons/background.mp3"
volume   = 0.25
fade_in  = 1.0
fade_out = 2.0

[bruitages]
choc     = "./assets/sons/vine_boom.mp3"
fail     = "./assets/sons/faaaah.mp3"
win      = "./assets/sons/tada.mp3"
malaise  = "./assets/sons/oh_no.mp3"

[personnages.moi]
couleur = "#0084FF"
cote    = "right"
voix    = "gtts"

[personnages.chef]
nom     = "CHEF"
couleur = "#3C3C3E"
cote    = "left"
voix    = "gtts"

# ── SCÈNE 1 : Titre ──────────────────────
[[scenes]]
id        = 1
type      = "titre"
texte     = "J'ai commandé 500 pizzas au boulot 🍕"
duree     = 3.0
animation = "fade_in"

# ── SCÈNE 2 : Début de la conversation ───
[[scenes]]
id       = 2
type     = "sms"
vitesse  = 80
messages = [
  {perso = "moi",  texte = "Chef j'ai fait une petite erreur"},
  {perso = "chef", texte = "C'est quoi encore"},
  {perso = "moi",  texte = "Tu te souviens de la commande de fournitures ?"},
  {perso = "chef", texte = "Oui pourquoi"},
  {perso = "moi",  texte = "J'ai mis 500 au lieu de 5"},
  {perso = "chef", texte = "500 stylos c'est pas grave"},
  {perso = "moi",  texte = "C'était pas des stylos..."},
]

# ── SCÈNE 3 : Réaction ───────────────────
[[scenes]]
id       = 3
type     = "reaction"
media    = "./assets/images/suspicious.jpg"
duree    = 2.0
effet    = "zoom_in"

# ── SCÈNE 4 : Le choc ────────────────────
[[scenes]]
id       = 4
type     = "sms"
vitesse  = 90
messages = [
  {perso = "chef", texte = "C'était QUOI"},
  {perso = "moi",  texte = "Des pizzas 🍕", bruitage = "$choc"},
]

# ── SCÈNE 5 : Réaction choc ──────────────
[[scenes]]
id       = 5
type     = "reaction"
media    = "./assets/images/shocked.jpg"
duree    = 2.5
bruitage = "$fail"
effet    = "shake"

# ── SCÈNE 6 : L'escalade ─────────────────
[[scenes]]
id       = 6
type     = "sms"
vitesse  = 70
messages = [
  {perso = "chef", texte = "COMMENT ON COMMANDE DES PIZZAS SUR LE BON DE COMMANDE"},
  {perso = "moi",  texte = "J'ai utilisé le mauvais formulaire 😅"},
  {perso = "chef", texte = "IL Y A 500 PIZZAS DANS LE COULOIR", effet = "shake"},
  {perso = "moi",  texte = "Côté positif... personne mange à la cantine 😄"},
  {perso = "chef", texte = "TU ES VIRÉ", bruitage = "$malaise"},
]

# ── SCÈNE 7 : Réaction malaise ───────────
[[scenes]]
id       = 7
type     = "reaction"
media    = "./assets/images/malaise.jpg"
duree    = 2.0
bruitage = "$malaise"
effet    = "zoom_in"

# ── SCÈNE 8 : Le twist ───────────────────
[[scenes]]
id       = 8
type     = "sms"
vitesse  = 90
messages = [
  {perso = "moi",  texte = "Même si j'ai commandé aussi des desserts ?"},
  {perso = "chef", texte = "..."},
  {perso = "chef", texte = "T'as commandé quoi comme desserts"},
  {perso = "moi",  texte = "Tiramisu pour tout le monde 🍰"},
  {perso = "chef", texte = "...tu es augmenté", bruitage = "$win"},
]

# ── SCÈNE 9 : Outro ──────────────────────
[[scenes]]
id        = 9
type      = "outro"
texte     = "Suivez pour plus 😂"
duree     = 3.0
animation = "fade_out"
bruitage  = "$win"
